<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">📍 Smart Attendance System</h2>

        <div class="mb-3">
            <label class="form-label">Enter Your Name</label>
            <input type="text" id="name" class="form-control" placeholder="Your Name">
        </div>

        <div class="mb-3">
            <label class="form-label">Department</label>
            <select id="department" class="form-select">
                <option value="">Select Department</option>
                <option value="Computer Engineering">Computer Engineering</option>
                <option value="Electrical Engineering">Electrical Engineering</option>
                <option value="Mechanical Engineering">Mechanical Engineering</option>
                <option value="Civil Engineering">Civil Engineering</option>
                <option value="Electronics Engineering">Electronics Engineering</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">USN Number</label>
            <input type="text" id="usn" class="form-control" placeholder="USN Number">
        </div>

        <!-- Camera Section -->
        <div class="mb-3">
            <label class="form-label">📸 Take Photo</label>
            <div class="text-center">
                <video id="video" width="100%" height="240" autoplay style="border-radius:8px; display:none;"></video>
                <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
                <img id="photo" src="" alt="Photo" style="width:100%; border-radius:8px; display:none;">
            </div>
            <div class="mt-2 d-flex gap-2">
                <button onclick="startCamera()" class="btn btn-secondary w-50">📷 Open Camera</button>
                <button onclick="capturePhoto()" class="btn btn-warning w-50" id="captureBtn" style="display:none;">📸 Capture</button>
            </div>
            <button onclick="retakePhoto()" class="btn btn-outline-secondary w-100 mt-2" id="retakeBtn" style="display:none;">🔄 Retake</button>
        </div>

        <button onclick="markAttendance()" class="btn btn-primary w-100">
            Mark Attendance
        </button>

        <p id="result" class="mt-3 text-center fw-bold"></p>
    </div>
</div>

<script>
let videoStream = null;
let photoData = null;

function startCamera() {
    const video = document.getElementById('video');
    const captureBtn = document.getElementById('captureBtn');

    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        videoStream = stream;
        video.srcObject = stream;
        video.style.display = 'block';
        captureBtn.style.display = 'block';
    })
    .catch(err => {
        alert("Camera access denied: " + err.message);
    });
}

function capturePhoto() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const photo = document.getElementById('photo');
    const captureBtn = document.getElementById('captureBtn');
    const retakeBtn = document.getElementById('retakeBtn');

    canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
    photoData = canvas.toDataURL('image/jpeg');

    photo.src = photoData;
    photo.style.display = 'block';
    video.style.display = 'none';
    captureBtn.style.display = 'none';
    retakeBtn.style.display = 'block';

    if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
    }
}

function retakePhoto() {
    const photo = document.getElementById('photo');
    const retakeBtn = document.getElementById('retakeBtn');

    photo.style.display = 'none';
    retakeBtn.style.display = 'none';
    photoData = null;
    startCamera();
}

function markAttendance() {
let name = document.getElementById("name").value;
let department = document.getElementById("department").value;
let usn = document.getElementById("usn").value;

if (!name) {
    alert("Enter your name");
    return;
}
if (!department) {
    alert("Select your department");
    return;
}
if (!usn) {
    alert("Enter your USN number");
    return;
}

    if (!photoData) {
        alert("Please take a photo first!");
        return;
    }

    document.getElementById("result").innerHTML = "<span class='text-info'>📍 Getting location...</span>";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            fetch("/mark", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: name,
                    department: department,
                    usn: usn,
                    latitude: position.coords.latitude,
                    longitude: position.coords.longitude,
                    photo: photoData
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    document.getElementById("result").innerHTML =
                        "<span class='text-success'>✅ Attendance Marked Successfully!</span>";
                }
                else if (data.status === "duplicate") {
                    document.getElementById("result").innerHTML =
                        "<span class='text-warning'>⚠️ Attendance Already Marked Today!</span>";
                }
                else {
                    document.getElementById("result").innerHTML =
                        "<span class='text-danger'>❌ Outside College Area!<br>📏 You are " + data.distance + " meters away from college.</span>";
                }
            })
            .catch(err => {
                document.getElementById("result").innerHTML =
                    "<span class='text-danger'>❌ Server error: " + err.message + "</span>";
            });
        },
        function(error) {
            let msg = "";
            if (error.code === 1) msg = "Location permission denied!";
            else if (error.code === 2) msg = "Location unavailable! Try outside.";
            else if (error.code === 3) msg = "Location timeout! Try again.";
            document.getElementById("result").innerHTML =
                "<span class='text-danger'>❌ " + msg + "</span>";
        },
        {
            enableHighAccuracy: true,
            timeout: 20000,
            maximumAge: 0
        });
    } else {
        alert("Location not supported by your browser!");
    }
}
</script>

</body>
</html>
