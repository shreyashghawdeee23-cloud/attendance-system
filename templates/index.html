<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">📍 Smart Attendance System</h2>

        <div class="mb-3">
            <label class="form-label">Enter Your Name</label>
            <input type="text" id="name" class="form-control" placeholder="Your Name">
        </div>

        <!-- Camera Section -->
        <div class="mb-3">
            <label class="form-label">📸 Take Photo</label>
            <div class="text-center">
                <video id="video" width="100%" height="240" autoplay style="border-radius:8px; display:none;"></video>
                <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
                <img id="photo" src="" alt="Photo" style="width:100%; border-radius:8px; display:none;">
            </div>
            <div class="mt-2 d-flex gap-2">
                <button onclick="startCamera()" class="btn btn-secondary w-50">📷 Open Camera</button>
                <button onclick="capturePhoto()" class="btn btn-warning w-50" id="captureBtn" style="display:none;">📸 Capture</button>
            </div>
            <button onclick="retakePhoto()" class="btn btn-outline-secondary w-100 mt-2" id="retakeBtn" style="display:none;">🔄 Retake</button>
        </div>

        <button onclick="markAttendance()" class="btn btn-primary w-100">
            Mark Attendance
        </button>

        <p id="result" class="mt-3 text-center"></p>
    </div>
</div>

<script>
let videoStream = null;
let photoData = null;

function startCamera() {
    const video = document.getElementById('video');
    const captureBtn = document.getElementById('captureBtn');

    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        videoStream = stream;
        video.srcObject = stream;
        video.style.display = 'block';
        captureBtn.style.display = 'block';
    })
    .catch(err => {
        alert("Camera access denied: " + err.message);
    });
}

function capturePhoto() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const photo = document.getElementById('photo');
    const captureBtn = document.getElementById('captureBtn');
    const retakeBtn = document.getElementById('retakeBtn');

    canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
    photoData = canvas.toDataURL('image/jpeg');

    photo.src = photoData;
    photo.style.display = 'block';
    video.style.display = 'none';
    captureBtn.style.display = 'none';
    retakeBtn.style.display = 'block';

    // Camera band karo
    if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
    }
}

function retakePhoto() {
    const photo = document.getElementById('photo');
    const retakeBtn = document.getElementById('retakeBtn');

    photo.style.display = 'none';
    retakeBtn.style.display = 'none';
    photoData = null;
    startCamera();
}

function markAttendance() {
    let name = document.getElementById("name").value;

    if (!name) {
        alert("Enter your name");
        return;
    }

    if (!photoData) {
        alert("Please take a photo first!");
        return;
    }

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            fetch("/mark", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: name,
                    latitude: position.coords.latitude,
                    longitude: position.coords.longitude,
                    photo: photoData
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    document.getElementById("result").innerHTML =
                        "<span class='text-success'>✅ Attendance Marked</span>";
                }
                else if (data.status === "duplicate") {
                    document.getElementById("result").innerHTML =
                        "<span class='text-warning'>⚠ Already marked today</span>";
                }
                else {
                    document.getElementById("result").innerHTML =
                        "<span class='text-danger'>❌ Outside college area</span>";
                }
            });
        });
    } else {
        alert("Location not supported");
    }
}
</script>

</body>
</html>
