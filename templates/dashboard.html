<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">
        <h2>📊 Attendance Dashboard</h2>
        <div>
            <a href="/download" class="btn btn-success">⬇ Download Excel</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>

    <!-- Graph -->
    <div class="card shadow p-3 mb-4">
        <h5>📈 Daily Attendance Graph</h5>
        <canvas id="attendanceChart"></canvas>
    </div>

    <!-- Attendance Table -->
    <div class="card shadow p-3">
        <h5 class="mb-3">🧾 Attendance Records</h5>
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Photo</th>
                    <th>Name</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                    <th>Date Time</th>
                </tr>
            </thead>
            <tbody>
                {% for i, row in records %}
                <tr>
                    <td>{{ i }}</td>
                    <td>
                        {% if row[4] %}
                        <img src="{{ row[4] }}" width="50" height="50"
                            style="border-radius:50%; object-fit:cover;">
                        {% else %}
                        <span class="text-muted">No photo</span>
                        {% endif %}
                    </td>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

<script>
    const chartLabels = {{ labels | tojson | safe }};
    const chartValues = {{ values | tojson | safe }};

    const ctx = document.getElementById('attendanceChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: chartLabels,
            datasets: [{
                label: 'Attendance Per Day',
                data: chartValues,
                backgroundColor: 'rgba(54, 162, 235, 0.6)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true, ticks: { precision: 0 } }
            }
        }
    });
</script>

</body>
</html>
